<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Invoice Validation</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="brand">
          <div>
            <p class="eyebrow">CrownRing</p>
            <h1>Invoice Validation</h1>
          </div>
        </div>

        <div class="upload-group">
          <input id="invoiceFile" class="file-input" type="file" accept=".csv,text/csv" multiple />
          <label class="file-button" for="invoiceFile">Upload CSV</label>
          <span id="fileStatus" class="file-status">No file selected</span>
        </div>
      </header>

      <section class="metrics" aria-label="Comparison summary">
        <article class="metric-card">
          <span>Total Lines</span>
          <strong id="totalLines">0</strong>
        </article>
        <article class="metric-card">
          <span>Matched</span>
          <strong id="matchLines">0</strong>
        </article>
        <article class="metric-card metric-card-alert">
          <span>Flagged</span>
          <strong id="flaggedLines">0</strong>
        </article>
      </section>

      <section class="review-panel">
        <div class="panel-header">
          <h2>Line Review</h2>
          <div class="status-legend" aria-label="Status legend">
            <span><i class="legend-dot legend-ok"></i>Matched</span>
            <span><i class="legend-dot legend-bad"></i>Red Flag</span>
          </div>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>UID</th>
                <th>PO#</th>
                <th>Date</th>
                <th>SKU</th>
                <th>Qty</th>
                <th>Karat</th>
                <th>Color</th>
                <th>Gold Wt (g)</th>
                <th>Gold $/oz</th>
                <th>Diamonds</th>
                <th>Labour ($)</th>
                <th>Final ($)</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="resultsBody">
              <tr>
                <td colspan="13" class="placeholder">No invoice uploaded</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
